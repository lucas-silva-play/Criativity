<section id="step-1" class="w-full max-w-3xl bg-white p-8 rounded-xl shadow-sm border border-gray-100">
            <h2 class="text-2xl font-bold mb-6">Setup & Briefing</h2>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Cliente / Marca</label>
                    <input type="text" placeholder="Ex: Caaqui, Loja Teste..." class="w-full border rounded p-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Destino do Criativo</label>
                    <select class="w-full border rounded p-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option>Insider One</option>
                        <option>Salesforce Marketing Cloud</option>
                        <option>HubSpot</option>
                        <option>Imagem Avulsa</option>
                    </select>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium mb-1">
                    Link do Site 
                    <span class="text-xs text-gray-400 font-normal ml-1">(Opcional - A IA lerá cores, fontes e tom de voz)</span>
                </label>
                <div class="relative">
                    <input type="url" placeholder="https://www.site-do-cliente.com.br" class="w-full border rounded p-2 pl-10 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium mb-1">Objetivo da Campanha (Prompt)</label>
                <textarea rows="3" class="w-full border rounded p-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ex: Criar uma campanha de resgate de carrinho focada em clientes que abandonaram sapatos de inverno. Tom de urgência."></textarea>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-medium mb-1">
                    Referências (Upload)
                    <span class="text-xs text-gray-400 font-normal ml-1">(Opcional)</span>
                </label>
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center bg-gray-50 hover:bg-gray-100 transition cursor-pointer">
                    <p class="text-gray-500">Arraste arquivos aqui ou clique para fazer upload</p>
                    <p class="text-xs text-gray-400 mt-2">PDFs, Imagens (JPG, PNG), DOCx</p>
                </div>
            </div>

            <div class="flex justify-end">
                <button onclick="simulateAIProcessing(2)" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow transition flex items-center gap-2">
                    Gerar Estrutura com IA 🪄
                </button>
            </div>
        </section>
